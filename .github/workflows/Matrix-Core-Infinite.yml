name: Matrix-Core Infinite Runner

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: matrix-core-group
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y curl g++ wget jq
          # Daha esnek bir filtre: Hem Linux olsun, hem x86-64 olsun, ama tar.gz OLMASIN (direkt binary)
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/official-stockfish/Stockfish/releases/latest | jq -r '.assets[] | select(.name | contains("ubuntu-x86-64") and (contains("tar.gz") | not)) | .browser_download_url' | head -n 1)
          
          # Eğer hala boşsa (fallback), içinde 'linux' ve 'static' geçen ilk şeyi al
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            DOWNLOAD_URL=$(curl -s https://api.github.com/repos/official-stockfish/Stockfish/releases/latest | jq -r '.assets[] | select(.name | contains("linux")) | .browser_download_url' | head -n 1)
          fi
          
          echo "Targeting URL: $DOWNLOAD_URL"
          wget -O stockfish "$DOWNLOAD_URL"
          chmod +x stockfish

      - name: Compile Matrix-Core
        run: |
          g++ -O3 MatriX_Core.cpp -o MatriX_Core -pthread

      - name: Execute Matrix-Core
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          chmod +x MatriX_Core
          ./MatriX_Core
