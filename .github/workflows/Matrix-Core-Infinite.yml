name: Matrix-Core Infinite Runner

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: matrix-core-group
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y curl g++ wget unzip
          wget https://github.com/official-stockfish/Stockfish/releases/latest/download/stockfish-ubuntu-x86-64-modern.tar.gz
          tar -xvf stockfish-ubuntu-x86-64-modern.tar.gz
          mv stockfish/stockfish-ubuntu-x86-64-modern ./stockfish
          chmod +x ./stockfish

      - name: Compile Matrix-Core
        run: |
          g++ -O3 MatriX_Core.cpp -o MatriX_Core -pthread

      - name: Execute Matrix-Core
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          chmod +x MatriX_Core
          ./MatriX_Core
